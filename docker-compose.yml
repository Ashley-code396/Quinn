version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: quinn-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: quinn
      POSTGRES_PASSWORD: quinn_dev_password
      POSTGRES_DB: quinn
    volumes:
      - quinn_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quinn"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: quinn-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - quinn_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  quinn_pgdata:
  quinn_redisdata:
